<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente Servisud</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #0E1A14;
    --surface:  #162010;
    --border:   #2A3D2A;
    --green:    #4CAF6B;
    --green-dim:#2E6B42;
    --text:     #D8E8D8;
    --muted:    #7A9B7A;
    --white:    #F0F7F0;
    --error:    #E05A4A;
    --pine:     #B8843F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 36px; height: 36px;
    background: var(--green);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 14px;
    color: var(--bg);
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.02em;
  }

  .header-info p {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 2px;
  }

  .status-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* CHAT AREA */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }

  /* WELCOME */
  .welcome {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    background: var(--surface);
  }

  .welcome h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .welcome p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .quick-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: all 0.15s;
  }

  .quick-btn:hover {
    border-color: var(--green-dim);
    color: var(--green);
    background: rgba(76,175,107,0.05);
  }

  /* MESSAGES */
  .message {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .msg-avatar {
    background: var(--pine);
    color: var(--bg);
  }

  .message.agent .msg-avatar {
    background: var(--green);
    color: var(--bg);
  }

  .msg-content {
    flex: 1;
  }

  .msg-label {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .msg-text {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .msg-text {
    color: var(--white);
    background: #1A2E1A;
    border-color: var(--green-dim);
  }

  /* LOADING */
  .loading .msg-text {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }

  .loading-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: bounce 1.2s infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* INPUT AREA */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    background: var(--bg);
  }

  .input-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--white);
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus {
    border-color: var(--green-dim);
  }

  textarea::placeholder {
    color: var(--muted);
  }

  button.send-btn {
    background: var(--green);
    border: none;
    border-radius: 6px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  button.send-btn:hover { background: #3d9e5a; }
  button.send-btn:disabled { background: var(--border); cursor: not-allowed; }

  button.send-btn svg {
    width: 18px; height: 18px;
    fill: var(--bg);
  }

  .input-hint {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 8px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">SV</div>
  <div class="header-info">
    <h1>Agente Servisud</h1>
    <p>Planificación de producción · Rengo, Chile</p>
  </div>
  <div class="status-dot">
    <div class="dot"></div>
    Activo
  </div>
</header>

<div class="chat-container" id="chat">
  <div class="welcome">
    <h2>Agente listo</h2>
    <p>Consulta producción, costos, despachos o stock. Respondo usando los datos actuales de Servisud.</p>
    <div class="quick-btns">
      <button class="quick-btn" onclick="sendQuick(this)">¿Cuánto cuesta producir 100 pallets Americano?</button>
      <button class="quick-btn" onclick="sendQuick(this)">¿Cuál es la capacidad semanal de la planta?</button>
      <button class="quick-btn" onclick="sendQuick(this)">¿Cuánta madera necesito para la semana S36?</button>
      <button class="quick-btn" onclick="sendQuick(this)">¿Cuál es el margen del pallet Euro?</button>
      <button class="quick-btn" onclick="sendQuick(this)">Explica la regla de despacho menos 7 días</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-inner">
    <textarea id="input" placeholder="Escribe tu consulta..." rows="1"
      onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="input-hint">Enter para enviar · Shift+Enter para nueva línea</p>
</div>

<script>
const WEBHOOK = 'https://hook.us2.make.com/1u315bknp4u4zjwy9eojie45832gpf1l';

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function addMessage(role, text, isLoading = false) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${role}${isLoading ? ' loading' : ''}`;

  const label = role === 'user' ? 'SP' : 'AI';
  const name  = role === 'user' ? 'Tú' : 'Agente';

  if (isLoading) {
    div.innerHTML = `
      <div class="msg-avatar">${label}</div>
      <div class="msg-content">
        <div class="msg-label">${name}</div>
        <div class="msg-text">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="msg-avatar">${label}</div>
      <div class="msg-content">
        <div class="msg-label">${name}</div>
        <div class="msg-text">${text}</div>
      </div>`;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendMessage() {
  const input = document.getElementById('input');
  const btn   = document.getElementById('sendBtn');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  addMessage('user', text);
  const loadingEl = addMessage('agent', '', true);

  try {
    const encoded = encodeURIComponent(text);
    const res = await fetch(`${WEBHOOK}?mensaje=${encoded}`, { signal: AbortSignal.timeout(60000) });
    const data = await res.text();
    loadingEl.remove();
    addMessage('agent', data || 'Respuesta recibida sin contenido.');
  } catch (err) {
    loadingEl.remove();
    addMessage('agent', '⚠ Error de conexión. Verifica que el escenario de Make.com esté activo.');
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

function sendQuick(btn) {
  document.getElementById('input').value = btn.textContent;
  sendMessage();
}
</script>
</body>
</html>
